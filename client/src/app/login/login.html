<div class="min-h-screen bg-white flex items-center justify-center px-4 pt-24 pb-12 relative overflow-hidden">
    <!-- Dynamic Background Decor to match Landing Page -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-green-50 via-transparent to-transparent opacity-60"></div>
  
    <div class="card w-full max-w-lg bg-white/80 backdrop-blur-xl border border-gray-100 shadow-2xl rounded-[2.5rem] relative z-10">
      <div class="card-body p-10">
        
        <!-- Icon & Branding -->
        <div class="flex flex-col items-center mb-8">
          <h2 class="text-4xl font-black text-gray-900 tracking-tighter">Welcome Back</h2>
          <p class="text-green-400 font-medium text-sm mt-2">Access your AI Adaptive Dashboard</p>
        </div>
  
        <form #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off" class="flex flex-col gap-6">
          
          <!-- Username Input -->
          <div class="form-control w-full">
            <label class="label pb-2">
              <span class="label-text text-gray-700 font-black uppercase tracking-widest text-[10px]">Username</span>
            </label>
            <div class="relative">
              <input [(ngModel)]="model.userName" name="userName" type="text" placeholder="johndoe123" required #uName="ngModel"
                class="input input-bordered bg-gray-50 border-gray-200 text-gray-900 rounded-2xl h-14 w-full focus:border-green-400/80 focus:ring-2 focus:ring-green-500/20 transition-all font-medium pl-12" 
                [class.border-red-500]="uName.invalid && uName.touched" />
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              </span>
            </div>
            @if (uName.invalid && uName.touched) {
              <span class="text-[10px] text-red-500 mt-1 font-bold pl-1 uppercase tracking-tighter">Username is required</span>
            }
          </div>
  
          <!-- Password Input -->
          <div class="form-control w-full">
            <div class="flex justify-between items-end mb-2">
              <label class="label p-0">
                  <span class="label-text text-gray-700 font-black uppercase tracking-widest text-[10px]">Password</span>
              </label>
            </div>
            <div class="relative">
              <input [(ngModel)]="model.password" name="password" type="password" placeholder="••••••••" required #pass="ngModel"
                class="input input-bordered bg-gray-50 border-gray-200 text-gray-900 rounded-2xl h-14 w-full focus:border-green-400/80 focus:ring-2 focus:ring-green-500/20 transition-all font-medium pl-12"
                [class.border-red-500]="pass.invalid && pass.touched" />
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
              </span>
            </div>
            @if (pass.invalid && pass.touched) {
              <span class="text-[10px] text-red-500 mt-1 font-bold pl-1 uppercase tracking-tighter">Password is required</span>
            }
          </div>
          <a class= "text-[10px] font-black text-green-600 hover:underline uppercase tracking-widest cursor-pointer">Forgot Password?</a>
  
          <!-- Submit Button -->
          <div class="flex flex-col items-center gap-4 mt-4">
            <button [disabled]="!loginForm.valid || isLoading()" type="submit"
              class="bg-green-400 border-none text-white font-black text-sm tracking-widest h-14 w-full rounded-2xl hover:bg-green-700 hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-green-500/30 disabled:bg-gray-200 disabled:text-gray-400 disabled:scale-100">
              {{ isLoading() ? 'AUTHENTICATING...' : 'SIGN IN' }}
            </button>
            
            <p class="text-sm text-gray-500 font-medium">
              New here? <a routerLink="/register" class="text-green-600 font-black hover:underline">Create account</a>
            </p>
          </div>
  
          <!-- Backend Exception Handling -->
          @if (errorMessage()) {
            <div class="mt-2 rounded-2xl border-l-4 border-red-500 bg-red-50 px-4 py-3 animate-shake">
              <div class="flex items-center gap-3">
                  <span class="text-red-500 font-bold text-lg">⚠️</span>
                  <div>
                      <p class="text-[10px] uppercase font-black text-red-800 tracking-widest">Authentication Error</p>
                      <p class="text-xs font-bold text-red-700">{{ errorMessage() }}</p>
                  </div>
              </div>
            </div>
          }
        </form>
      </div>
    </div>
  </div>
